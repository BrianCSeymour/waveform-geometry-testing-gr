name: waveform-geometry-tgr
channels:
  - conda-forge
  - nodefaults          # new: prevents silent fallback to defaults channel
dependencies:
  - python=3.10.20
  - pip=26.0.1
  - numpy=2.2.6         # NB: you're already on NumPy 2.x
  - pandas=2.3.3
  - scipy=1.15.2
  - matplotlib=3.10.8
  - multiprocess=0.70.19
  - tqdm=4.67.3
  - astropy=6.1.7
  - ipykernel=7.2.0
  - jax=0.6.2
  - jaxlib=0.6.2        # must match jax exactly
  - qnm=0.4.4
  - spherical=1.0.18
  - quaternionic=1.0.17
  - gwpopulation=1.3.1
  - pathos=0.3.5
  - lal=7.7.0
  - ipywidgets=8.1.8
  - pip:
    - jimGW==0.1.1
    - pycbc==2.9.0





